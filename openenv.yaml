name: solar-rl-env
version: "1.0.0"
description: >
  Reinforcement learning environment simulating a dual-axis solar panel
  tracking system. The agent maximises energy output over a 24-hour day.

tasks:
  - id: easy
    name: Easy — clear sky
    difficulty: easy
    max_steps: 96
    grader:
      type: deterministic
      endpoint: /score
      description: >
        Score = cumulative energy harvested / 7200 Wh ceiling.
        Clear sky, no movement penalty, perfect forecast.
        Score is strictly between 0.001 and 0.999.

  - id: medium
    name: Medium — mild clouds
    difficulty: medium
    max_steps: 96
    grader:
      type: deterministic
      endpoint: /score
      description: >
        Score = cumulative energy harvested / 6500 Wh ceiling.
        Mild cloud noise, small movement penalty, slight forecast noise.
        Score is strictly between 0.001 and 0.999.

  - id: hard
    name: Hard — heavy clouds
    difficulty: hard
    max_steps: 96
    grader:
      type: deterministic
      endpoint: /score
      description: >
        Score = cumulative energy harvested / 5000 Wh ceiling.
        Heavy cloud noise, strong movement penalty, noisy forecast.
        Score is strictly between 0.001 and 0.999.

state_space:
  time_of_day:    {type: float, range: [0.0, 24.0]}
  sun_azimuth:    {type: float, range: [0.0, 360.0]}
  sun_elevation:  {type: float, range: [-90.0, 90.0]}
  predicted_irradiance: {type: float, range: [0.0, 1000.0]}
  panel_tilt:     {type: float, range: [0.0, 90.0]}
  panel_rotation: {type: float, range: [0.0, 360.0]}

action_space:
  tilt_change:     {type: float, range: [-1.0, 1.0]}
  rotation_change: {type: float, range: [-1.0, 1.0]}

runtime:
  max_steps: 96
  step_duration_hours: 0.25
  entry_point: env.solar_env:SolarEnv
  server_port: 7860